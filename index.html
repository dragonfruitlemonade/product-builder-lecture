<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Lotto Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <div class="container">
        <header>
            <div class="theme-toggle">
                <button id="theme-btn" aria-label="Toggle Dark Mode">
                    <span class="icon">🌙</span>
                </button>
            </div>
            <h1>행운의 로또 번호</h1>
            <p class="subtitle">오늘의 행운을 잡으세요!</p>
        </header>

        <main>
            <div class="lotto-card">
                <div id="numbers-container" class="numbers-display">
                    <div class="ball placeholder">?</div>
                    <div class="ball placeholder">?</div>
                    <div class="ball placeholder">?</div>
                    <div class="ball placeholder">?</div>
                    <div class="ball placeholder">?</div>
                    <div class="ball placeholder">?</div>
                </div>
                
                <div class="actions">
                    <button id="generate-btn" class="primary-btn">
                        번호 생성하기
                    </button>
                </div>
            </div>

            <section class="contact-card">
                <h2>제휴 문의</h2>
                <form action="https://formspree.io/f/mykdnrrn" method="POST">
                    <div class="form-group">
                        <label for="name">성함/업체명</label>
                        <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" placeholder="문의하실 내용을 적어주세요" required></textarea>
                    </div>
                    <button type="submit" class="primary-btn">문의 보내기</button>
                </form>
            </section>
        </main>

        <footer>
            <p>© 2026 Lotto Generator. All rights reserved.</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
